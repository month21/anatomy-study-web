function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ');}
function catColor(cats,name){return(cats.find(c=>c.name===name)||{colorHex:'#6366F1'}).colorHex;}
function catAxial(cats,name){const c=cats.find(c=>c.name===name);return c?c.axial:true;}

// ── FIREBASE ──
let _db=null,_auth=null;
function initFb(cfg){
  try{if(!firebase.apps.length)firebase.initializeApp(cfg);_db=firebase.firestore();_auth=firebase.auth();
    return true;}catch{return false;}
}
function getFbCfg(){try{return JSON.parse(localStorage.getItem('fb_cfg'));}catch{return null;}}
async function dbSave(uid,data){try{await _db.collection('users').doc(uid).set(data,{merge:true});}catch{}}
async function dbLoad(uid){try{const d=await _db.collection('users').doc(uid).get();return d.exists?d.data():{};}catch{return{};}}

async function uploadCloudinary(uid,boneId,file){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);fd.append('public_id',`${uid}_${boneId}`);
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:'POST',body:fd});
  const j=await r.json();return j.secure_url||null;
}

// ── UI HELPERS ──
function Tag({label,color,small}){
  return <span style={{display:'inline-block',padding:small?'2px 8px':'3px 10px',borderRadius:20,fontSize:small?10:11,fontWeight:700,background:color+'22',color,border:`1px solid ${color}44`}}>{label}</span>;
}
function IB({text,bg,bd,tc}){return <div style={{padding:'10px 12px',background:bg,border:`1px solid ${bd}`,borderRadius:10,fontSize:13,color:tc,lineHeight:1.7}}>{text}</div>;}
const INP={width:'100%',padding:'10px 12px',border:'1px solid #e5e7eb',borderRadius:10,fontSize:14,fontFamily:'inherit',outline:'none',background:'#fff',color:'#111827'};
function FL({t}){return <div style={{fontSize:11,fontWeight:700,color:'#6b7280',letterSpacing:1,marginBottom:5}}>{t}</div>;}

// ── BONE DETAIL MODAL ──
function Modal({bone,cats,onClose}){
  if(!bone)return null;
  const c=catColor(cats,bone.cat);
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:520,background:'#fff',borderRadius:'20px 20px 0 0',padding:'8px 22px 40px',animation:'slideUp .22s ease',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{width:36,height:4,background:'#e5e7eb',borderRadius:2,margin:'12px auto 18px'}}/>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          <Tag label={bone.axial?'축뼈대':'팔다리뼈대'} color={bone.axial?'#0ea5e9':'#f97316'}/>
          <Tag label={bone.cat} color={c}/>
        </div>
        <div style={{fontSize:28,fontWeight:900}}>{bone.k}</div>
        <div style={{fontSize:13,color:'#9ca3af',fontStyle:'italic',fontFamily:'Georgia,serif',margin:'4px 0 12px'}}>{bone.l}</div>
        {bone.desc&&<div style={{fontSize:14,color:'#374151',lineHeight:1.8,marginBottom:10}}>{bone.desc}</div>}
        {bone.tip&&<div style={{marginBottom:8}}><IB text={`💡 ${bone.tip}`} bg='#fefce8' bd='#fde68a' tc='#92400e'/></div>}
        {bone.story&&<IB text={`📖 ${bone.story}`} bg='#f0fdf4' bd='#bbf7d0' tc='#166534'/>}
        <button onClick={onClose} style={{marginTop:18,width:'100%',padding:14,borderRadius:12,border:'none',background:'#111827',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
      </div>
    </div>
  );
}

        <FL t='암기 TIP'/><textarea style={{...INP,resize:'vertical',minHeight:46,marginBottom:8}} value={f.tip} onChange={e=>setF(x=>({...x,tip:e.target.value}))}/>
        <FL t='연상 스토리 📖'/><textarea style={{...INP,resize:'vertical',minHeight:58,marginBottom:14}} placeholder='기억에 남는 연상 이야기...' value={f.story} onChange={e=>setF(x=>({...x,story:e.target.value}))}/>

          <button onClick={()=>{if(f.k.trim()&&f.l.trim())onSave(f);}} disabled={!f.k.trim()||!f.l.trim()} style={{flex:2,padding:12,borderRadius:10,border:'none',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',background:(!f.k.trim()||!f.l.trim())?'#e5e7eb':'#111827',color:(!f.k.trim()||!f.l.trim())?'#9ca3af':'#fff'}}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── CLASSIFY ──
function ClassifyMode({bones,cats,setBones,setCats}){
  const [popup,setPopup]=useState(null);

  const [apOpen,setApOpen]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const sorted=[...cats].sort((a,b)=>a.order-b.order);
  const axCats=sorted.filter(c=>c.axial),apCats=sorted.filter(c=>!c.axial);
  function Hdr({title,cnt,catCnt,accent,open,onToggle}){return(
    <div onClick={onToggle} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',cursor:'pointer',background:'#fff',borderBottom:'1px solid #f3f4f6',userSelect:'none'}}>
      <div style={{width:4,height:38,borderRadius:2,background:accent,flexShrink:0}}/>
      <div style={{flex:1}}><div style={{fontSize:15,fontWeight:800,color:accent}}>{title}</div><div style={{fontSize:11,color:'#9ca3af'}}>{cnt}개 뼈 · {catCnt}개 카테고리</div></div>
      <span style={{fontSize:18,color:'#9ca3af',transition:'transform .22s',transform:open?'rotate(180deg)':'none'}}>▼</span>
    </div>
  );}

    return(<div style={{padding:'6px 14px 4px'}}>

        <div style={{flex:1,height:1,background:'#f3f4f6'}}/>
      </div>

        <span style={{fontSize:10,color:'#9ca3af',fontStyle:'italic',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:90}}>{b.l.split('(')[0].trim()}</span>
      </div>)}
    </div>);
  }
  return(<>
    <div style={{paddingBottom:80}}>

      {axOpen&&<div className='fadeIn'>{axCats.map(c=><CatGrp key={c.name} cat={c}/>)}<div style={{height:8}}/></div>}
      <div style={{height:6,background:'#f3f4f6'}}/>
      <Hdr title='팔다리뼈대' cnt={bones.filter(b=>apCats.some(c=>c.name===b.cat)).length} catCnt={apCats.length} accent='#f97316' open={apOpen} onToggle={()=>setApOpen(o=>!o)}/>
      {apOpen&&<div className='fadeIn'>{apCats.map(c=><CatGrp key={c.name} cat={c}/>)}<div style={{height:8}}/></div>}

        </div>
        {!user&&<div style={{fontSize:11,color:'#f59e0b',marginTop:8}}>⚠ 이미지 저장은 로그인 후 가능해요.</div>}
      </div>}

      </div>
      <div style={{width:'100%',height:3,background:'#f3f4f6',borderRadius:2}}>

        <button onClick={()=>{setIdx(i=>i+1);setFlip(false);}} style={{flex:2,padding:13,borderRadius:12,border:'none',background:'#111827',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:700,fontFamily:'inherit'}}>다음 →</button>

  );

// ── QUIZ ──
function QuizMode({bones,cats,onWrong}){
  const [tab,setTab]=useState('choice');
  return(<div style={{padding:14}}>
    <div style={{display:'flex',gap:6,marginBottom:16}}>
      {[['choice','📝 4지선다'],['input','⌨️ 직접 입력']].map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{padding:'9px 18px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',background:tab===t?'#111827':'#f3f4f6',color:tab===t?'#fff':'#6b7280'}}>{l}</button>)}
    </div>
    {tab==='choice'?<ChoiceQ bones={bones} cats={cats} onWrong={onWrong}/>:<InputQ bones={bones} cats={cats} onWrong={onWrong}/>}
  </div>);
}
function ChoiceQ({bones,cats,onWrong}){
  const [sc,setSc]=useState({c:0,t:0});
  const [curr,setCurr]=useState(null);
  const [opts,setOpts]=useState([]);
  const [sel,setSel]=useState(null);
  const [dir,setDir]=useState('k2l');
  function next(){if(bones.length<4)return;const b=bones[Math.floor(Math.random()*bones.length)];setOpts(shuffle([b,...shuffle(bones.filter(x=>x.id!==b.id)).slice(0,3)]));setCurr(b);setSel(null);}
  useEffect(()=>{next();},[bones.length,dir]);
  if(!curr||bones.length<4)return <div style={{textAlign:'center',padding:40,color:'#9ca3af'}}>단어가 4개 이상 필요합니다.</div>;
  const ans=opt=>{if(sel)return;const ok=opt.id===curr.id;setSel(opt);setSc(s=>({c:s.c+(ok?1:0),t:s.t+1}));if(!ok)onWrong(curr.id);};
  const acc=sc.t>0?Math.round(sc.c/sc.t*100):null;
  return(<div style={{maxWidth:520,margin:'0 auto',display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',gap:6}}>{[['k2l','한→라틴'],['l2k','라틴→한']].map(([d,l])=><button key={d} onClick={()=>setDir(d)} style={{padding:'7px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit',background:dir===d?'#111827':'#f3f4f6',color:dir===d?'#fff':'#6b7280'}}>{l}</button>)}</div>
      {acc!==null&&<div style={{display:'flex',gap:8,fontSize:13}}><span style={{color:'#16a34a',fontWeight:700}}>✓{sc.c}</span><span style={{color:'#dc2626',fontWeight:700}}>✗{sc.t-sc.c}</span><span style={{color:'#9ca3af'}}>{acc}%</span></div>}
    </div>
    <div style={{padding:20,background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:14,textAlign:'center'}}>
      <Tag label={curr.cat} color={catColor(cats,curr.cat)}/>
      <div style={{fontSize:28,fontWeight:800,margin:'10px 0 4px',fontStyle:dir==='l2k'?'italic':'normal',fontFamily:dir==='l2k'?'Georgia,serif':'inherit',lineHeight:1.3}}>{dir==='k2l'?curr.k:curr.l}</div>
      <div style={{fontSize:12,color:'#9ca3af'}}>{dir==='k2l'?'라틴어':'한국어'} 명칭을 고르세요</div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {opts.map((o,i)=>{const isC=o.id===curr.id,isS=sel&&sel.id===o.id;return(
        <button key={o.id} onClick={()=>ans(o)} style={{padding:'13px 16px',borderRadius:12,textAlign:'left',cursor:sel?'default':'pointer',fontSize:dir==='l2k'?15:14,fontStyle:dir==='l2k'?'italic':'normal',fontFamily:dir==='l2k'?'Georgia,serif':'inherit',background:sel?(isC?'#f0fdf4':isS?'#fef2f2':'#f9fafb'):'#fff',border:`1px solid ${sel?(isC?'#86efac':isS?'#fca5a5':'#e5e7eb'):'#e5e7eb'}`,color:sel?(isC?'#166534':isS?'#991b1b':'#9ca3af'):'#111827',fontWeight:isS?700:400,transition:'all .18s'}}>
          <span style={{fontSize:11,color:'#d1d5db',fontStyle:'normal',fontFamily:'inherit'}}>{'ABCD'[i]}. </span>{dir==='k2l'?o.l:o.k}
        </button>
      );})}
    </div>
    {sel&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {curr.tip&&<IB text={`💡 ${curr.tip}`} bg='#fefce8' bd='#fde68a' tc='#92400e'/>}
      {curr.story&&<IB text={`📖 ${curr.story}`} bg='#f0fdf4' bd='#bbf7d0' tc='#166534'/>}
      <button onClick={next} style={{padding:13,borderRadius:12,border:'none',background:'#111827',color:'#fff',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'inherit'}}>다음 문제 →</button>
    </div>}
  </div>);
}
function InputQ({bones,cats,onWrong}){
  const [sc,setSc]=useState({c:0,t:0});
  const [curr,setCurr]=useState(null);
  const [dir,setDir]=useState('k2l');
  const [input,setInput]=useState('');
  const [result,setResult]=useState(null);
  const [sk,setSk]=useState(0);
  const iRef=useRef(null);
  function next(){if(!bones.length)return;setCurr(bones[Math.floor(Math.random()*bones.length)]);setInput('');setResult(null);setTimeout(()=>iRef.current?.focus(),50);}
  useEffect(()=>{next();},[bones.length,dir]);
  if(!curr)return null;
  const ca=dir==='k2l'?curr.l:curr.k;
  function check(){
    if(result||!input.trim())return;
    const ok=norm(input)===norm(ca)||norm(input)===norm(ca.split('(')[0]);
    setResult(ok?'correct':'wrong');setSc(s=>({c:s.c+(ok?1:0),t:s.t+1}));
    if(!ok){onWrong(curr.id);setSk(k=>k+1);}
  }
  const acc=sc.t>0?Math.round(sc.c/sc.t*100):null;
  return(<div style={{maxWidth:520,margin:'0 auto',display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',gap:6}}>{[['k2l','한→라틴'],['l2k','라틴→한']].map(([d,l])=><button key={d} onClick={()=>setDir(d)} style={{padding:'7px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit',background:dir===d?'#111827':'#f3f4f6',color:dir===d?'#fff':'#6b7280'}}>{l}</button>)}</div>
      {acc!==null&&<div style={{display:'flex',gap:8,fontSize:13}}><span style={{color:'#16a34a',fontWeight:700}}>✓{sc.c}</span><span style={{color:'#dc2626',fontWeight:700}}>✗{sc.t-sc.c}</span><span style={{color:'#9ca3af'}}>{acc}%</span></div>}
    </div>
    <div style={{padding:20,background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:14,textAlign:'center'}}>
      <Tag label={curr.cat} color={catColor(cats,curr.cat)}/>
      <div style={{fontSize:28,fontWeight:800,margin:'10px 0 4px',fontStyle:dir==='l2k'?'italic':'normal',fontFamily:dir==='l2k'?'Georgia,serif':'inherit',lineHeight:1.3}}>{dir==='k2l'?curr.k:curr.l}</div>
      <div style={{fontSize:12,color:'#9ca3af'}}>{dir==='k2l'?'라틴어':'한국어'}로 직접 입력하세요</div>
    </div>
    <div key={sk} className={result==='wrong'?'shake':''} style={{position:'relative'}}>
      <input ref={iRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){result?next():check();}}} disabled={!!result}
        placeholder={dir==='k2l'?'라틴어 명칭 입력...':'한국어 명칭 입력...'}
        style={{width:'100%',padding:'13px 16px',borderRadius:12,fontSize:15,fontFamily:dir==='k2l'?'Georgia,serif':'inherit',fontStyle:dir==='k2l'?'italic':'normal',border:`1.5px solid ${result==='correct'?'#86efac':result==='wrong'?'#fca5a5':'#e5e7eb'}`,background:result==='correct'?'#f0fdf4':result==='wrong'?'#fef2f2':'#fff',color:result==='correct'?'#166534':result==='wrong'?'#991b1b':'#111827',outline:'none',transition:'all .18s'}}/>
      {result&&<span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:18}}>{result==='correct'?'✅':'❌'}</span>}
    </div>
    {result&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {result==='wrong'&&<div style={{padding:'11px 14px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10,fontSize:14,color:'#991b1b',fontWeight:600}}>정답: <span style={{fontStyle:dir==='k2l'?'italic':'normal',fontFamily:dir==='k2l'?'Georgia,serif':'inherit'}}>{ca}</span></div>}
      {result==='correct'&&<div style={{padding:'11px 14px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:10,fontSize:14,color:'#166534',fontWeight:600,textAlign:'center'}}>🎉 정답!</div>}
      {curr.tip&&<IB text={`💡 ${curr.tip}`} bg='#fefce8' bd='#fde68a' tc='#92400e'/>}
      {curr.story&&<IB text={`📖 ${curr.story}`} bg='#f0fdf4' bd='#bbf7d0' tc='#166534'/>}
      <button onClick={next} style={{padding:13,borderRadius:12,border:'none',background:'#111827',color:'#fff',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'inherit'}}>다음 문제 → (Enter)</button>
    </div>}
    {!result&&<button onClick={check} disabled={!input.trim()} style={{padding:13,borderRadius:12,border:'none',background:!input.trim()?'#e5e7eb':'#111827',color:!input.trim()?'#9ca3af':'#fff',cursor:!input.trim()?'default':'pointer',fontSize:15,fontWeight:700,fontFamily:'inherit'}}>확인 (Enter)</button>}
  </div>);
}

// ── STATS ──
function StatsMode({bones,cats,stats,onClear}){
  const [popup,setPopup]=useState(null);
  const entries=Object.entries(stats).map(([id,cnt])=>({bone:bones.find(b=>b.id===id),cnt})).filter(e=>e.bone).sort((a,b)=>b.cnt-a.cnt);
  const total=entries.reduce((s,e)=>s+e.cnt,0);
  const maxCnt=entries[0]?.cnt||1;
  const catMap={};entries.forEach(({bone,cnt})=>{if(!catMap[bone.cat])catMap[bone.cat]={cnt:0,n:0};catMap[bone.cat].cnt+=cnt;catMap[bone.cat].n+=1;});
  const catList=Object.entries(catMap).sort((a,b)=>b[1].cnt-a[1].cnt);

function CatManager({cats,setCats,bones}){

  const [confirm,setConfirm]=useState(null);
  const sorted=[...cats].sort((a,b)=>a.order-b.order);
  function move(i,up){const list=[...sorted];const j=up?i-1:i+1;if(j<0||j>=list.length)return;[list[i],list[j]]=[list[j],list[i]];setCats(list.map((c,idx)=>({...c,order:idx})));}
  function EditDlg({cat,isNew}){
    const [name,setName]=useState(cat.name);
    const [colorHex,setColorHex]=useState(cat.colorHex||COLOR_PALETTE[0]);
    const [axial,setAxial]=useState(cat.axial);
    return(<div onClick={()=>{setEditCat(null);setShowAdd(false);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:520,background:'#fff',borderRadius:'20px 20px 0 0',padding:'8px 22px 36px',maxHeight:'88vh',overflowY:'auto',animation:'slideUp .22s ease'}}>
        <div style={{width:36,height:4,background:'#e5e7eb',borderRadius:2,margin:'12px auto 14px'}}/>
        <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>{isNew?'새 분류 추가':'분류 수정'}</div>
        <FL t='이름 *'/><input style={{...INP,marginBottom:4}} value={name} onChange={e=>setName(e.target.value)} readOnly={!isNew}/>
        {!isNew&&<div style={{fontSize:11,color:'#9ca3af',marginBottom:10}}>※ 이름은 변경할 수 없어요</div>}
        <FL t='색상'/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><div style={{width:30,height:30,borderRadius:8,background:colorHex}}/><span style={{fontSize:12,color:'#6b7280',fontWeight:600}}>{colorHex}</span></div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:12}}>
          {COLOR_PALETTE.map(h=><div key={h} onClick={()=>setColorHex(h)} style={{width:28,height:28,borderRadius:7,background:h,cursor:'pointer',border:colorHex===h?'2.5px solid #111827':'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>{colorHex===h&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}</div>)}
        </div>
        <FL t='유형'/>
        <div style={{display:'flex',gap:6,marginBottom:16}}>
          {[true,false].map(v=><button key={String(v)} onClick={()=>setAxial(v)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${axial===v?'#111827':'#e5e7eb'}`,background:axial===v?'#111827':'#fff',color:axial===v?'#fff':'#374151',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>{v?'축뼈대':'팔다리뼈대'}</button>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{setEditCat(null);setShowAdd(false);}} style={{flex:1,padding:12,borderRadius:10,border:'1px solid #e5e7eb',background:'#fff',color:'#6b7280',cursor:'pointer',fontFamily:'inherit',fontSize:14}}>취소</button>
          <button onClick={()=>{if(!name.trim())return;if(isNew)setCats(p=>[...p,{name:name.trim(),colorHex,axial,order:cats.length}]);else setCats(p=>p.map(c=>c.name===cat.name?{...c,colorHex,axial}:c));setEditCat(null);setShowAdd(false);}} style={{flex:2,padding:12,borderRadius:10,border:'none',background:'#111827',color:'#fff',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:14}}>저장</button>
        </div>
      </div>
    </div>);

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{fontSize:15,fontWeight:800}}>분류 관리</div>
      <button onClick={()=>setShowAdd(true)} style={{padding:'8px 14px',borderRadius:10,border:'none',background:'#111827',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>+ 추가</button>
    </div>
    <div style={{fontSize:12,color:'#9ca3af'}}>탭해서 색상 수정 / ▲▼로 순서 변경</div>
    <div style={{display:'flex',flexDirection:'column',gap:8,paddingBottom:40}}>
      {sorted.map((cat,i)=>{const bc=bones.filter(b=>b.cat===cat.name).length;return(
        <div key={cat.name} style={{padding:'12px 14px',borderRadius:12,border:`1px solid ${cat.colorHex}33`,background:'#fff',display:'flex',alignItems:'center',gap:12,cursor:'pointer'}} onClick={()=>setEditCat(cat)}>
          <div style={{width:30,height:30,borderRadius:8,background:cat.colorHex,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{color:'#fff',fontSize:13,fontWeight:800}}>{cat.name[0]}</span></div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{cat.name}</div><div style={{fontSize:11,color:'#6b7280'}}>{cat.axial?'축뼈대':'팔다리뼈대'} · {bc}개 뼈</div></div>
          <div style={{display:'flex',flexDirection:'column',gap:2}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>move(i,true)} disabled={i===0} style={{width:26,height:26,borderRadius:6,border:'1px solid #e5e7eb',background:'#fff',cursor:i===0?'default':'pointer',color:i===0?'#d1d5db':'#374151',fontSize:12,fontFamily:'inherit'}}>▲</button>

          </div>
          <button onClick={e=>{e.stopPropagation();setConfirm(cat.name);}} style={{padding:'6px 10px',borderRadius:8,border:'1px solid #fca5a5',background:'#fff',color:'#dc2626',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>삭제</button>
        </div>
      );})}
    </div>
    {editCat&&<EditDlg cat={editCat} isNew={false}/>}
    {showAdd&&<EditDlg cat={{name:'',colorHex:COLOR_PALETTE[0],axial:true,order:cats.length}} isNew={true}/>}
    {confirm&&(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:20}}>
      <div style={{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:300,textAlign:'center'}}>
        <div style={{fontSize:28,marginBottom:10}}>🗑️</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>'{confirm}' 삭제?</div>
        <div style={{fontSize:13,color:'#6b7280',marginBottom:20}}>이 분류에 속한 단어 {bones.filter(b=>b.cat===confirm).length}개도 영향을 받아요.</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setConfirm(null)} style={{flex:1,padding:12,borderRadius:10,border:'1px solid #e5e7eb',background:'#fff',color:'#374151',cursor:'pointer',fontFamily:'inherit',fontSize:14}}>취소</button>
          <button onClick={()=>{setCats(c=>c.filter(x=>x.name!==confirm));setConfirm(null);}} style={{flex:1,padding:12,borderRadius:10,border:'none',background:'#dc2626',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:700}}>삭제</button>
        </div>
      </div>
    </div>)}
  </div>);
}

// ── FIREBASE SETUP ──
function FbSetup({onSave}){
  const [raw,setRaw]=useState('');const [err,setErr]=useState('');
  function save(){setErr('');try{let cfg;const c=raw.trim();if(c.startsWith('{'))cfg=JSON.parse(c);else{const m=c.match(/const\s+firebaseConfig\s*=\s*(\{[\s\S]*?\});/);if(m)cfg=eval('('+m[1]+')');else throw new Error('설정 형식을 인식할 수 없어요.');}if(!cfg.apiKey||!cfg.projectId)throw new Error('apiKey, projectId 필드가 필요해요.');onSave(cfg);}catch(e){setErr(e.message);}}
  return(<div style={{minHeight:'100vh',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{width:'100%',maxWidth:480,background:'#fff',borderRadius:20,padding:28,boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
      <div style={{fontSize:28,marginBottom:4}}>🔥</div>
      <div style={{fontSize:20,fontWeight:900,marginBottom:4}}>Firebase 연결</div>
      <div style={{fontSize:13,color:'#6b7280',marginBottom:20}}>단어·통계를 Google 계정에 저장하려면 Firebase 프로젝트가 필요해요.</div>
      <div style={{fontSize:12,fontWeight:700,color:'#374151',letterSpacing:1,marginBottom:8}}>FIREBASE CONFIG 붙여넣기</div>
      <textarea value={raw} onChange={e=>{setRaw(e.target.value);setErr('');}} placeholder={'{\n  "apiKey": "AIza...",\n  "authDomain": "...",\n  "projectId": "...",\n  ...\n}'} style={{width:'100%',minHeight:130,padding:12,border:`1.5px solid ${err?'#fca5a5':'#e5e7eb'}`,borderRadius:12,fontSize:12,fontFamily:'monospace',resize:'vertical',outline:'none',color:'#111827',background:'#f9fafb'}}/>
      {err&&<div style={{fontSize:12,color:'#dc2626',marginTop:6,padding:'8px 12px',background:'#fef2f2',borderRadius:8}}>⚠️ {err}</div>}
      <button onClick={save} disabled={!raw.trim()} style={{marginTop:12,width:'100%',padding:14,borderRadius:12,border:'none',fontSize:15,fontWeight:700,cursor:raw.trim()?'pointer':'default',background:raw.trim()?'#111827':'#e5e7eb',color:raw.trim()?'#fff':'#9ca3af',fontFamily:'inherit'}}>연결하기 →</button>
      <div style={{marginTop:14,padding:'10px 14px',background:'#fefce8',border:'1px solid #fde68a',borderRadius:10,fontSize:12,color:'#92400e'}}>💡 Firebase 무료 플랜(Spark)으로 충분해요.</div>
    </div>
  </div>);
}

// ── MAIN ──
function App(){
  const [fbCfg,setFbCfg]=useState(getFbCfg);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(false);
  const [dataLoading,setDataLoading]=useState(false);
  const [bones,setBones]=useState(DEFAULT_BONES);
  const [cats,setCats]=useState(DEFAULT_CATEGORIES);
  const [stats,setStats]=useState({});
  const [imgUrls,setImgUrls]=useState({});
  const [sync,setSync]=useState(null);
  const [mode,setMode]=useState('classify');
  const st=useRef(null);

  function showSync(s){setSync(s);if(st.current)clearTimeout(st.current);if(s==='saved')st.current=setTimeout(()=>setSync(null),2000);}

  useEffect(()=>{
    if(!fbCfg)return;
    if(!initFb(fbCfg)){localStorage.removeItem('fb_cfg');setFbCfg(null);return;}
    setAuthLoading(true);
    const unsub=_auth.onAuthStateChanged(async u=>{
      setUser(u);setAuthLoading(false);
      if(u){
        setDataLoading(true);
        const data=await dbLoad(u.uid);
        if(data.bones?.length>0)setBones(data.bones);else await dbSave(u.uid,{bones:DEFAULT_BONES,stats:{},categories:DEFAULT_CATEGORIES});
        if(data.stats)setStats(data.stats);
        if(data.categories?.length>0)setCats(data.categories);
        if(data.imageUrls)setImgUrls(data.imageUrls);
        setDataLoading(false);
      }
    });
    return unsub;
  },[fbCfg]);

  const saveBones=useCallback(updater=>{setBones(prev=>{const next=typeof updater==='function'?updater(prev):updater;(async()=>{showSync('saving');if(user)await dbSave(user.uid,{bones:next});showSync('saved');})();return next;});},[user]);
  const saveCats=useCallback(updater=>{setCats(prev=>{const next=typeof updater==='function'?updater(prev):updater;(async()=>{showSync('saving');if(user)await dbSave(user.uid,{categories:next});showSync('saved');})();return next;});},[user]);
  const addWrong=useCallback(id=>{setStats(s=>{const n={...s,[id]:(s[id]||0)+1};(async()=>{if(user)await dbSave(user.uid,{stats:n});})();return n;});},[user]);
  const clearStats=()=>{setStats({});if(user)dbSave(user.uid,{stats:{}});};
  const signIn=async()=>{const p=new firebase.auth.GoogleAuthProvider();try{await _auth.signInWithPopup(p);}catch{}};
  const signOut=async()=>{await _auth.signOut();};
  const resetCfg=()=>{if(confirm('Firebase 설정을 초기화할까요?')){localStorage.removeItem('fb_cfg');setFbCfg(null);}};

  if(!fbCfg)return <FbSetup onSave={cfg=>{localStorage.setItem('fb_cfg',JSON.stringify(cfg));setFbCfg(cfg);}}/>;
  if(dataLoading)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8fafc'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:16}}>🦴</div><div style={{color:'#6b7280',fontSize:14}}>계정 데이터 불러오는 중...</div></div></div>;

  const wrongTotal=Object.values(stats).reduce((a,b)=>a+b,0);
  const MODES=[{id:'classify',label:'분류',icon:'📊'},{id:'compare',label:'비교',icon:'⚡'},{id:'flashcard',label:'카드',icon:'📇'},{id:'quiz',label:'퀴즈',icon:'🎯'},{id:'stats',label:'통계',icon:'📈',badge:wrongTotal>0?wrongTotal:null},{id:'manage',label:'단어',icon:'✏️'},{id:'catmgr',label:'분류관리',icon:'🗂️'}];

  return(<div style={{minHeight:'100vh',background:'#f8fafc',paddingBottom:68}}>
    {/* 헤더 */}
    <div style={{borderBottom:'1px solid #e5e7eb',background:'#fff',padding:'10px 16px',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:15,fontWeight:900,letterSpacing:-0.5}}>🦴 골격계 해부학</div>
        <div style={{fontSize:10,letterSpacing:1.5,marginTop:1,display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:'#9ca3af'}}>SKELETAL ANATOMY · {bones.length}개 단어</span>
          {sync==='saving'&&<span style={{color:'#0ea5e9'}}>저장 중...</span>}
          {sync==='saved'&&<span style={{color:'#16a34a'}}>✓ 저장됨</span>}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {user&&<button onClick={resetCfg} style={{padding:'4px 8px',borderRadius:8,border:'1px solid #e5e7eb',background:'transparent',color:'#9ca3af',cursor:'pointer',fontSize:10}}>🔧</button>}
        {authLoading?<div style={{width:28,height:28}}/>
        :user?<div style={{position:'relative'}}>
          <button onClick={()=>{const m=document.getElementById('pm');m.style.display=m.style.display==='none'?'block':'none';}} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:20,border:'1px solid #e5e7eb',background:'#f9fafb',cursor:'pointer',fontFamily:'inherit'}}>
            {user.photoURL?<img src={user.photoURL} alt='' style={{width:22,height:22,borderRadius:'50%',objectFit:'cover'}}/>:<div style={{width:22,height:22,borderRadius:'50%',background:'#6366f1',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#fff'}}>{(user.displayName||'?')[0].toUpperCase()}</div>}
            <span style={{fontSize:12,fontWeight:600,color:'#374151',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName?.split(' ')[0]||'사용자'}</span>
          </button>
          <div id='pm' style={{display:'none',position:'absolute',right:0,top:'calc(100% + 6px)',background:'#fff',border:'1px solid #e5e7eb',borderRadius:12,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',minWidth:160,zIndex:100}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid #f3f4f6'}}><div style={{fontSize:12,fontWeight:700}}>{user.displayName}</div><div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>{user.email}</div></div>
            <div style={{padding:'4px 6px'}}><button onClick={()=>{signOut();document.getElementById('pm').style.display='none';}} style={{width:'100%',padding:'9px 10px',borderRadius:8,border:'none',background:'transparent',color:'#dc2626',cursor:'pointer',fontSize:13,fontWeight:600,textAlign:'left',fontFamily:'inherit'}}>로그아웃</button></div>
          </div>
        </div>
        :<button onClick={signIn} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:20,border:'1px solid #e5e7eb',background:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,color:'#374151',fontFamily:'inherit',whiteSpace:'nowrap'}}>
          <svg width='14' height='14' viewBox='0 0 24 24'><path fill='#4285F4' d='M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z'/><path fill='#34A853' d='M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z'/><path fill='#FBBC05' d='M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z'/><path fill='#EA4335' d='M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z'/></svg>
          Google 로그인
        </button>}
      </div>
    </div>
    {!user&&!authLoading&&<div onClick={signIn} style={{background:'#fefce8',borderBottom:'1px solid #fde68a',padding:'10px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontSize:13}}>🔑</span>
      <span style={{fontSize:13,color:'#92400e'}}>Google 로그인하면 단어·통계·이미지가 어느 기기에서나 저장돼요.</span>
      <span style={{marginLeft:'auto',fontSize:13,fontWeight:700,color:'#d97706'}}>로그인 →</span>
    </div>}
    {/* 콘텐츠 */}
    <div style={{maxWidth:580,margin:'0 auto'}}>
      {mode==='classify'&&<ClassifyMode bones={bones} cats={cats} setBones={saveBones} setCats={saveCats}/>}
      {mode==='compare'&&<CompareMode bones={bones} cats={cats}/>}
      {mode==='flashcard'&&<FlashcardMode bones={bones} cats={cats} user={user} imgUrls={imgUrls} setImgUrls={setImgUrls}/>}
      {mode==='quiz'&&<QuizMode bones={bones} cats={cats} onWrong={addWrong}/>}
      {mode==='stats'&&<StatsMode bones={bones} cats={cats} stats={stats} onClear={clearStats}/>}
      {mode==='manage'&&<WordManager bones={bones} cats={cats} setBones={saveBones} setCats={saveCats}/>}
      {mode==='catmgr'&&<CatManager cats={cats} setCats={saveCats} bones={bones}/>}
    </div>
    {/* 하단 네비 */}
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e5e7eb',display:'flex',zIndex:50,boxShadow:'0 -2px 12px rgba(0,0,0,0.06)'}}>
      {MODES.map(m=>(
        <button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:'10px 2px 12px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative',fontFamily:'inherit'}}>
          {mode===m.id&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:22,height:2,background:'#111827',borderRadius:1}}/>}
          <span style={{fontSize:16}}>{m.icon}</span>
          <span style={{fontSize:8,fontWeight:700,color:mode===m.id?'#111827':'#9ca3af',letterSpacing:0.3}}>{m.label}</span>
          {m.badge&&<span style={{position:'absolute',top:5,right:'8%',background:'#ef4444',color:'#fff',fontSize:8,fontWeight:800,borderRadius:10,padding:'1px 4px',minWidth:14,textAlign:'center'}}>{m.badge>99?'99+':m.badge}</span>}
        </button>
      ))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
