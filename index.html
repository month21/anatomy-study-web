function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function normalize(s){return s.trim().toLowerCase().replace(/\s+/g," ");}

// ── GITHUB API ──
async function ghGet(token){
  const res=await fetch(GH_API,{headers:{Authorization:`token ${token}`,Accept:"application/vnd.github.v3+json"}});
  if(res.status===404)return null;
  if(!res.ok)throw new Error(`GitHub 오류: ${res.status}`);
  return res.json();
}

async function ghSave(token,bones,sha){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(bones,null,2))));
  const body={message:sha?"단어 데이터 업데이트":"단어 데이터 초기화",content,...(sha&&{sha})};
  const res=await fetch(GH_API,{method:"PUT",headers:{Authorization:`token ${token}`,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||"저장 실패");}
  return (await res.json()).content.sha;
}

function loadToken(){try{return localStorage.getItem("gh_token")||"";}catch{return "";}}
function saveToken(t){try{localStorage.setItem("gh_token",t);}catch{}}
function loadStats(){try{const r=localStorage.getItem("as2");if(r)return JSON.parse(r);}catch{}return {};}
function saveStats(s){try{localStorage.setItem("as2",JSON.stringify(s));}catch{}}

function Tag({label,color,small}){
  return <span style={{display:"inline-block",padding:small?"2px 8px":"3px 10px",borderRadius:20,fontSize:small?10:11,fontWeight:700,background:color+"22",color,border:`1px solid ${color}44`}}>{label}</span>;
}

function Modal({bone,onClose}){
  if(!bone)return null;
  const c=CAT_COLOR[bone.cat];
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:520,background:"#fff",borderRadius:"20px 20px 0 0",padding:"8px 22px 40px",boxShadow:"0 -8px 40px rgba(0,0,0,0.18)",animation:"slideUp 0.22s ease",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#e5e7eb",borderRadius:2,margin:"12px auto 20px"}}/>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <Tag label={bone.axial?"축뼈대":"팔다리뼈대"} color={bone.axial?"#0ea5e9":"#f97316"}/>
          <Tag label={bone.cat} color={c}/>
        </div>
        <div style={{fontSize:30,fontWeight:900,color:"#111827"}}>{bone.k}</div>
        <div style={{fontSize:13,color:"#9ca3af",fontStyle:"italic",fontFamily:"Georgia,serif",margin:"4px 0 14px"}}>{bone.l}</div>
        {bone.desc&&<div style={{fontSize:14,color:"#374151",lineHeight:1.8,marginBottom:12}}>{bone.desc}</div>}
        {bone.tip&&<div style={{padding:"11px 14px",background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,fontSize:13,color:"#92400e",lineHeight:1.6,marginBottom:10}}>💡 {bone.tip}</div>}
        {bone.story&&<div style={{padding:"11px 14px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,fontSize:13,color:"#166534",lineHeight:1.7}}>📖 {bone.story}</div>}
        <button onClick={onClose} style={{marginTop:20,width:"100%",padding:15,borderRadius:12,border:"none",background:"#111827",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>닫기</button>
      </div>
    </div>
  );
}

// ── TOKEN SETUP SCREEN ──
function TokenSetup({onSave}){
  const [val,setVal]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  async function test(){
    if(!val.trim())return;
    setLoading(true);setErr("");
    try{
      const res=await fetch(`https://api.github.com/repos/${REPO}`,{headers:{Authorization:`token ${val.trim()}`}});
      if(!res.ok)throw new Error("토큰이 올바르지 않거나 repo 접근 권한이 없어요.");
      saveToken(val.trim());
      onSave(val.trim());
    }catch(e){setErr(e.message);}
    setLoading(false);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#f8fafc"}}>
      <div style={{width:"100%",maxWidth:380,background:"#fff",borderRadius:20,padding:28,boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>🔑</div>
        <div style={{fontSize:18,fontWeight:900,color:"#111827",textAlign:"center",marginBottom:6}}>GitHub 토큰 입력</div>
        <div style={{fontSize:13,color:"#6b7280",textAlign:"center",marginBottom:20,lineHeight:1.6}}>
          단어를 GitHub에 저장하려면<br/>Personal Access Token이 필요해요.<br/>
          <span style={{fontSize:11,color:"#9ca3af"}}>토큰은 이 기기에만 저장되고 외부로 전송되지 않아요.</span>
        </div>
        <input
          type="password"
          value={val}
          onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&test()}
          placeholder="ghp_xxxxxxxxxxxx"
          style={{width:"100%",padding:"12px 14px",border:`1.5px solid ${err?"#fca5a5":"#e5e7eb"}`,borderRadius:10,fontSize:14,outline:"none",fontFamily:"monospace",marginBottom:10}}
        />

function ChoiceQuiz({bones,onWrong}){
  const [score,setScore]=useState({c:0,t:0});
  const [curr,setCurr]=useState(null);
  const [opts,setOpts]=useState([]);
  const [sel,setSel]=useState(null);
  const [dir,setDir]=useState("k2l");
  function next(){if(bones.length<4)return;const b=bones[Math.floor(Math.random()*bones.length)];setOpts(shuffle([b,...shuffle(bones.filter(x=>x.id!==b.id)).slice(0,3)]));setCurr(b);setSel(null);}
  useEffect(()=>{next();},[bones.length,dir]);
  if(!curr||bones.length<4)return<div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>단어가 4개 이상 필요합니다.</div>;
  const answer=opt=>{if(sel)return;const ok=opt.id===curr.id;setSel(opt);setScore(s=>({c:s.c+(ok?1:0),t:s.t+1}));if(!ok)onWrong(curr.id);};
  const acc=score.t>0?Math.round(score.c/score.t*100):null;
  return(
    <div style={{maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6}}>
          {[["k2l","한 → 라틴"],["l2k","라틴 → 한"]].map(([d,l])=>(
            <button key={d} onClick={()=>setDir(d)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:dir===d?"#111827":"#f3f4f6",color:dir===d?"#fff":"#6b7280"}}>{l}</button>
          ))}
        </div>
        {acc!==null&&<div style={{display:"flex",gap:10,fontSize:13}}><span style={{color:"#16a34a",fontWeight:700}}>✓{score.c}</span><span style={{color:"#dc2626",fontWeight:700}}>✗{score.t-score.c}</span><span style={{color:"#9ca3af",fontWeight:600}}>{acc}%</span></div>}
      </div>
      <div style={{padding:22,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14,textAlign:"center"}}>
        <Tag label={curr.cat} color={CAT_COLOR[curr.cat]}/>
        <div style={{fontSize:30,fontWeight:800,color:"#111827",margin:"12px 0 4px",fontStyle:dir==="l2k"?"italic":"normal",fontFamily:dir==="l2k"?"Georgia,serif":"inherit",lineHeight:1.3}}>{dir==="k2l"?curr.k:curr.l}</div>
        <div style={{fontSize:12,color:"#9ca3af"}}>{dir==="k2l"?"라틴어":"한국어"} 명칭을 고르세요</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {opts.map((o,i)=>{const isC=o.id===curr.id,isS=sel&&sel.id===o.id;return<button key={o.id} onClick={()=>answer(o)} style={{padding:"14px 16px",borderRadius:12,textAlign:"left",cursor:sel?"default":"pointer",fontSize:dir==="l2k"?15:14,fontStyle:dir==="l2k"?"italic":"normal",fontFamily:dir==="l2k"?"Georgia,serif":"inherit",background:sel?(isC?"#f0fdf4":isS?"#fef2f2":"#f9fafb"):"#fff",border:`1px solid ${sel?(isC?"#86efac":isS?"#fca5a5":"#e5e7eb"):"#e5e7eb"}`,color:sel?(isC?"#166534":isS?"#991b1b":"#9ca3af"):"#111827",transition:"all 0.18s",fontWeight:isS?700:400}}><span style={{fontSize:11,color:"#d1d5db",fontStyle:"normal",fontFamily:"inherit"}}>{"ABCD"[i]}. </span>{dir==="k2l"?o.l:o.k}</button>;})}
      </div>
      {sel&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {curr.tip&&<div style={{padding:"10px 14px",background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,fontSize:13,color:"#92400e"}}>💡 {curr.tip}</div>}
        {curr.story&&<div style={{padding:"10px 14px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,fontSize:13,color:"#166534"}}>📖 {curr.story}</div>}
        <button onClick={next} style={{padding:14,borderRadius:12,border:"none",background:"#111827",color:"#fff",cursor:"pointer",fontSize:15,fontWeight:700}}>다음 문제 →</button>
      </div>}
    </div>
  );
}

function InputQuiz({bones,onWrong}){
  const [score,setScore]=useState({c:0,t:0});
  const [curr,setCurr]=useState(null);
  const [dir,setDir]=useState("k2l");
  const [input,setInput]=useState("");
  const [result,setResult]=useState(null);
  const [shakeKey,setShakeKey]=useState(0);
  const inputRef=useRef(null);
  function next(){if(!bones.length)return;setCurr(bones[Math.floor(Math.random()*bones.length)]);setInput("");setResult(null);setTimeout(()=>inputRef.current&&inputRef.current.focus(),50);}
  useEffect(()=>{next();},[bones.length,dir]);
  if(!curr)return null;
  const correctAnswer=dir==="k2l"?curr.l:curr.k;
  function checkAnswer(){
    if(result||!input.trim())return;
    const userAns=normalize(input),fullAns=normalize(correctAnswer),baseAns=normalize(correctAnswer.split("(")[0]);
    const ok=userAns===fullAns||userAns===baseAns;
    setResult(ok?"correct":"wrong");
    setScore(s=>({c:s.c+(ok?1:0),t:s.t+1}));
    if(!ok){onWrong(curr.id);setShakeKey(k=>k+1);}
  }
  function handleKey(e){if(e.key==="Enter"){if(result)next();else checkAnswer();}}
  const acc=score.t>0?Math.round(score.c/score.t*100):null;
  return(
    <div style={{maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6}}>
          {[["k2l","한 → 라틴"],["l2k","라틴 → 한"]].map(([d,l])=>(
            <button key={d} onClick={()=>setDir(d)} style={{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:dir===d?"#111827":"#f3f4f6",color:dir===d?"#fff":"#6b7280"}}>{l}</button>
          ))}
        </div>
        {acc!==null&&<div style={{display:"flex",gap:10,fontSize:13}}><span style={{color:"#16a34a",fontWeight:700}}>✓{score.c}</span><span style={{color:"#dc2626",fontWeight:700}}>✗{score.t-score.c}</span><span style={{color:"#9ca3af",fontWeight:600}}>{acc}%</span></div>}
      </div>
      <div style={{padding:22,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14,textAlign:"center"}}>
        <Tag label={curr.cat} color={CAT_COLOR[curr.cat]}/>
        <div style={{fontSize:30,fontWeight:800,color:"#111827",margin:"12px 0 4px",fontStyle:dir==="l2k"?"italic":"normal",fontFamily:dir==="l2k"?"Georgia,serif":"inherit",lineHeight:1.3}}>{dir==="k2l"?curr.k:curr.l}</div>
        <div style={{fontSize:12,color:"#9ca3af"}}>{dir==="k2l"?"라틴어":"한국어"}로 직접 입력하세요</div>
      </div>
      <div key={shakeKey} className={result==="wrong"?"shake":""} style={{position:"relative"}}>
        <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} disabled={!!result} placeholder={dir==="k2l"?"라틴어 명칭 입력...":"한국어 명칭 입력..."} style={{width:"100%",padding:"14px 16px",borderRadius:12,fontSize:15,fontFamily:dir==="k2l"?"Georgia,serif":"inherit",fontStyle:dir==="k2l"?"italic":"normal",border:`1.5px solid ${result==="correct"?"#86efac":result==="wrong"?"#fca5a5":"#e5e7eb"}`,background:result==="correct"?"#f0fdf4":result==="wrong"?"#fef2f2":"#fff",color:result==="correct"?"#166534":result==="wrong"?"#991b1b":"#111827",outline:"none",transition:"all 0.18s"}}/>
        {result&&<span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>{result==="correct"?"✅":"❌"}</span>}
      </div>
      {result&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {result==="wrong"&&<div style={{padding:"12px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,fontSize:14,color:"#991b1b",fontWeight:600}}>정답: <span style={{fontStyle:dir==="k2l"?"italic":"normal",fontFamily:dir==="k2l"?"Georgia,serif":"inherit"}}>{correctAnswer}</span></div>}
        {result==="correct"&&<div style={{padding:"12px 14px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,fontSize:14,color:"#166534",fontWeight:600,textAlign:"center"}}>🎉 정답!</div>}
        {curr.tip&&<div style={{padding:"10px 14px",background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,fontSize:13,color:"#92400e"}}>💡 {curr.tip}</div>}
        {curr.story&&<div style={{padding:"10px 14px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,fontSize:13,color:"#166534"}}>📖 {curr.story}</div>}
        <button onClick={next} style={{padding:14,borderRadius:12,border:"none",background:"#111827",color:"#fff",cursor:"pointer",fontSize:15,fontWeight:700}}>다음 문제 → (Enter)</button>
      </div>}
      {!result&&<button onClick={checkAnswer} disabled={!input.trim()} style={{padding:14,borderRadius:12,border:"none",background:!input.trim()?"#e5e7eb":"#111827",color:!input.trim()?"#9ca3af":"#fff",cursor:!input.trim()?"default":"pointer",fontSize:15,fontWeight:700}}>확인 (Enter)</button>}
    </div>
  );
}

      <div><div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10}}>📊 취약 카테고리</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {catList.map(([cat,{cnt,n}])=>(<div key={cat} style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLOR[cat],flexShrink:0}}/><span style={{fontSize:13,fontWeight:600,color:"#374151",width:52,flexShrink:0}}>{cat}</span><div style={{flex:1,height:8,background:"#f3f4f6",borderRadius:4,overflow:"hidden"}}><div style={{width:`${(cnt/total)*100}%`,height:"100%",background:CAT_COLOR[cat],borderRadius:4}}/></div><span style={{fontSize:11,color:"#9ca3af",flexShrink:0}}>{cnt}회/{n}개</span></div>))}
        </div>
      </div>
      <div><div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10}}>🔴 자주 틀리는 단어</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {entries.map(({bone,cnt},i)=>(<button key={bone.id} onClick={()=>setPopup(bone)} style={{padding:"12px 14px",borderRadius:12,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:14,fontWeight:800,color:"#9ca3af",width:22,textAlign:"center",flexShrink:0}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}</span><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}><span style={{fontSize:15,fontWeight:700,color:"#111827"}}>{bone.k}</span><Tag label={bone.cat} color={CAT_COLOR[bone.cat]} small/></div><div style={{fontSize:11,color:"#9ca3af",fontStyle:"italic",fontFamily:"Georgia,serif"}}>{bone.l}</div></div><div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:16,fontWeight:800,color:"#ef4444"}}>{cnt}회</div><div style={{width:56,height:4,background:"#f3f4f6",borderRadius:2,marginTop:3}}><div style={{width:`${(cnt/maxCnt)*100}%`,height:"100%",background:"#ef4444",borderRadius:2}}/></div></div></button>))}
        </div>
      </div>
      <button onClick={onClear} style={{padding:12,borderRadius:10,border:"1px solid #fca5a5",background:"#fff5f5",color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:600}}>🗑️ 통계 초기화</button>
    </div>
    <Modal bone={popup} onClose={()=>setPopup(null)}/>
  </>);
}

// ── WORD MANAGER ──
const EMPTY_FORM={k:"",l:"",cat:"두개골",desc:"",tip:"",story:""};
const ALL_CATS=["두개골","척주","흉곽","상지대","상지","하지대","하지"];
const CAT_AXIAL={두개골:true,척주:true,흉곽:true,상지대:false,상지:false,하지대:false,하지:false};

function WordManager({bones,onSave,saving}){
  const [form,setForm]=useState(EMPTY_FORM);
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");
  const [confirm,setConfirm]=useState(null);
  const [open,setOpen]=useState(false);
  const filtered=bones.filter(b=>b.k.includes(search)||b.l.toLowerCase().includes(search.toLowerCase())||b.cat.includes(search));
  const inp={width:"100%",padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:10,fontSize:14,fontFamily:"inherit",outline:"none",background:"#fff",color:"#111827"};
  const lbl={fontSize:11,fontWeight:700,color:"#6b7280",letterSpacing:1,marginBottom:5,display:"block"};
  function startEdit(b){setEditId(b.id);setForm({k:b.k,l:b.l,cat:b.cat,desc:b.desc||"",tip:b.tip||"",story:b.story||""});setOpen(true);}
  function cancel(){setEditId(null);setForm(EMPTY_FORM);setOpen(false);}
  function save(){
    if(!form.k.trim()||!form.l.trim())return;
    let updated;
    if(editId){updated=bones.map(b=>b.id===editId?{...b,...form,axial:CAT_AXIAL[form.cat]}:b);}
    else{updated=[...bones,{id:"c_"+Date.now(),...form,axial:CAT_AXIAL[form.cat]}];}
    onSave(updated);cancel();
  }
  function del(id){onSave(bones.filter(b=>b.id!==id));setConfirm(null);if(editId===id)cancel();}
  function reset(){onSave(DEFAULT_BONES);cancel();setConfirm(null);}
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {saving&&<div style={{padding:"10px 14px",background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,fontSize:13,color:"#0369a1",display:"flex",alignItems:"center",gap:8}}><span className="spin">⏳</span> GitHub에 저장 중...</div>}
      <div style={{display:"flex",gap:8}}>
        <input style={{...inp,flex:1}} placeholder="🔍 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
        <button onClick={()=>{setEditId(null);setForm(EMPTY_FORM);setOpen(o=>!o);}} style={{padding:"10px 16px",borderRadius:10,border:"none",background:open?"#374151":"#111827",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,whiteSpace:"nowrap"}}>{open?"닫기":"+ 추가"}</button>
      </div>
      {open&&(
        <div style={{padding:18,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:14}}>
          <div style={{fontSize:14,fontWeight:800,color:"#111827",marginBottom:14}}>{editId?"✏️ 수정":"➕ 새 단어"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><label style={lbl}>한국어 *</label><input style={inp} value={form.k} onChange={e=>setForm(f=>({...f,k:e.target.value}))}/></div>
              <div style={{flex:1}}><label style={lbl}>라틴어 *</label><input style={inp} value={form.l} onChange={e=>setForm(f=>({...f,l:e.target.value}))}/></div>
            </div>
            <div><label style={lbl}>분류</label><select style={inp} value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{ALL_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label style={lbl}>설명</label><textarea style={{...inp,resize:"vertical",minHeight:52}} value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
            <div><label style={lbl}>암기 TIP</label><textarea style={{...inp,resize:"vertical",minHeight:48}} value={form.tip} onChange={e=>setForm(f=>({...f,tip:e.target.value}))}/></div>
            <div><label style={lbl}>연상 스토리 📖</label><textarea style={{...inp,resize:"vertical",minHeight:60}} placeholder="기억에 남는 연상 이야기..." value={form.story} onChange={e=>setForm(f=>({...f,story:e.target.value}))}/></div>
            <div style={{display:"flex",gap:8}}>
              {editId&&<button onClick={cancel} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #e5e7eb",background:"#fff",color:"#6b7280",cursor:"pointer",fontSize:14}}>취소</button>}
              <button onClick={save} disabled={!form.k.trim()||!form.l.trim()||saving} style={{flex:2,padding:12,borderRadius:10,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",background:(!form.k.trim()||!form.l.trim()||saving)?"#e5e7eb":"#111827",color:(!form.k.trim()||!form.l.trim()||saving)?"#9ca3af":"#fff"}}>{saving?"저장 중...":editId?"저장":"추가"}</button>
            </div>
          </div>
        </div>
      )}
      <div style={{fontSize:12,color:"#9ca3af"}}>{filtered.length}개</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(b=>(
          <div key={b.id} style={{padding:"12px 14px",borderRadius:12,border:`1px solid ${editId===b.id?"#111827":"#e5e7eb"}`,background:editId===b.id?"#f0f9ff":"#fff",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLOR[b.cat],flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>{b.k}</span>
                <Tag label={b.cat} color={CAT_COLOR[b.cat]} small/>
                {!DEFAULT_BONES.find(d=>d.id===b.id)&&<Tag label="추가됨" color="#8b5cf6" small/>}
              </div>
              <div style={{fontSize:11,color:"#9ca3af",fontStyle:"italic",fontFamily:"Georgia,serif"}}>{b.l}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>startEdit(b)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",color:"#374151",cursor:"pointer",fontSize:12}}>수정</button>
              <button onClick={()=>setConfirm(b.id)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #fca5a5",background:"#fff",color:"#dc2626",cursor:"pointer",fontSize:12}}>삭제</button>
            </div>
          </div>
        ))}
      </div>
      <button onClick={()=>setConfirm("reset")} style={{padding:12,borderRadius:10,border:"1px solid #fca5a5",background:"#fff5f5",color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:600}}>🔄 기본값 초기화</button>
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:300,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:10}}>{confirm==="reset"?"⚠️":"🗑️"}</div>
            <div style={{fontSize:16,fontWeight:700,color:"#111827",marginBottom:8}}>{confirm==="reset"?"기본값으로 초기화?":"삭제할까요?"}</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:20}}>{confirm==="reset"?"추가한 단어가 모두 사라져요.":"삭제 후 되돌릴 수 없어요."}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirm(null)} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #e5e7eb",background:"#fff",color:"#374151",cursor:"pointer",fontSize:14}}>취소</button>
              <button onClick={()=>confirm==="reset"?reset():del(confirm)} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>확인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ──
function App(){
  const [token,setToken]=useState(()=>loadToken());
  const [bones,setBones]=useState(DEFAULT_BONES);
  const [sha,setSha]=useState(null);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saveErr,setSaveErr]=useState("");
  const [stats,setStats]=useState(()=>loadStats());
  const [mode,setMode]=useState("classify");

  // 토큰 있으면 GitHub에서 데이터 로드
  useEffect(()=>{
    if(!token)return;
    setLoading(true);
    ghGet(token).then(data=>{
      if(data){
        const content=JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,"")))));
        setBones(content);
        setSha(data.sha);
      }
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[token]);

  const handleSave=useCallback(async(newBones)=>{
    setBones(newBones);
    setSaving(true);setSaveErr("");
    try{
      const newSha=await ghSave(token,newBones,sha);
      setSha(newSha);
    }catch(e){setSaveErr(e.message);}
    setSaving(false);
  },[token,sha]);

  const addWrong=useCallback((id)=>{setStats(s=>{const n={...s,[id]:(s[id]||0)+1};saveStats(n);return n;});},[]);
  const clearStats=()=>{setStats({});saveStats({});};
  const wrongTotal=Object.values(stats).reduce((a,b)=>a+b,0);

  if(!token)return<TokenSetup onSave={t=>{setToken(t);}}/>;

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,background:"#f8fafc"}}>
      <span style={{fontSize:36}} className="spin">⏳</span>
      <div style={{fontSize:14,color:"#6b7280"}}>GitHub에서 데이터 불러오는 중...</div>
    </div>
  );

  const MODES=[
    {id:"classify",label:"분류",icon:"📊"},
    {id:"compare",label:"비교",icon:"⚡"},
    {id:"flashcard",label:"카드",icon:"📇"},
    {id:"quiz",label:"퀴즈",icon:"🎯"},
    {id:"stats",label:"통계",icon:"📈",badge:wrongTotal>0?wrongTotal:null},
    {id:"manage",label:"단어",icon:"✏️"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#f8fafc",paddingBottom:68}}>
      <div style={{borderBottom:"1px solid #e5e7eb",background:"#fff",padding:"12px 16px",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:-0.5}}>🦴 골격계 해부학</div>
            <div style={{fontSize:10,color:"#9ca3af",letterSpacing:1.5,marginTop:1}}>SKELETAL ANATOMY · {bones.length}개 단어</div>
          </div>
          <button onClick={()=>{saveToken("");setToken("");}} style={{fontSize:11,color:"#9ca3af",background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>🔑 토큰 재설정</button>
        </div>
        {saveErr&&<div style={{marginTop:8,padding:"6px 10px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,fontSize:12,color:"#dc2626"}}>저장 실패: {saveErr}</div>}
      </div>
      <div style={{maxWidth:580,margin:"0 auto",padding:"18px 14px"}}>
        {mode==="classify"&&<ClassificationMode bones={bones}/>}
        {mode==="compare"&&<ComparisonMode bones={bones}/>}
        {mode==="flashcard"&&<FlashcardMode bones={bones}/>}
        {mode==="quiz"&&<QuizMode bones={bones} onWrong={addWrong}/>}
        {mode==="stats"&&<StatsMode bones={bones} stats={stats} onClear={clearStats}/>}
        {mode==="manage"&&<WordManager bones={bones} onSave={handleSave} saving={saving}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #e5e7eb",display:"flex",zIndex:50,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
        {MODES.map(m=>(
          <button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:"10px 2px 12px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            {mode===m.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:2,background:"#111827",borderRadius:1}}/>}
            <span style={{fontSize:17}}>{m.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:mode===m.id?"#111827":"#9ca3af",letterSpacing:0.3}}>{m.label}</span>
            {m.badge&&<span style={{position:"absolute",top:5,right:"12%",background:"#ef4444",color:"#fff",fontSize:8,fontWeight:800,borderRadius:10,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{m.badge>99?"99+":m.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
